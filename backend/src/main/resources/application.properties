spring.application.name=aiInterview
server.port=${SERVER_PORT:8080}

# ===== MongoDB =====
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ai_interview}

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-base64-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ===== Jackson =====
spring.jackson.default-property-inclusion=non_null

# ===== Logging =====
logging.level.com.utsav.aiInterview=DEBUG
