spring.application.name=aiInterview
# Hosting platforms (Render/Cloud Run/etc.) inject PORT; fall back to SERVER_PORT/8080 locally.
server.port=${PORT:${SERVER_PORT:8080}}

# ===== CORS =====
# Comma-separated list of allowed frontend origins (e.g. the Vercel URL). Override in prod.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===== MongoDB (Spring Boot 4 uses the spring.mongodb.* prefix) =====
# Real Atlas URI lives in the git-ignored mongo-secrets.properties (imported below).
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ai_interview}

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-base64-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===== File upload =====
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# ===== Google Gemini =====
# Load the key from a git-ignored local file (or the GEMINI_API_KEY env var). Never commit the real key.
spring.config.import=optional:file:./gemini-secrets.properties,optional:file:./mongo-secrets.properties
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.api.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

# ===== Jackson =====
spring.jackson.default-property-inclusion=non_null

# ===== Logging =====
logging.level.com.utsav.aiInterview=DEBUG
